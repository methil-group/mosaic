<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mosaic E2E UI Test</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --text-color: #cccccc;
            --input-bg: #3c3c3c;
            --input-text: #ffffff;
            --input-border: #3c3c3c;
            --button-bg: #007acc;
            --button-text: #ffffff;
            --border-color: #454545;
            --vscode-editor-inactiveSelectionBackground: rgba(255, 255, 255, 0.1);
            --vscode-sideBar-background: #1e1e1e;
            --vscode-input-background: #3c3c3c;
            --vscode-input-border: #3c3c3c;
            --vscode-descriptionForeground: #8b8b8b;
            --vscode-editorGroupHeader-tabsBackground: #252526;
            --vscode-widget-border: #454545;
            --vscode-editor-background: #1e1e1e;
            --vscode-editor-foreground: #d4d4d4;
            --vscode-dropdown-background: #3c3c3c;
            --vscode-dropdown-border: #3c3c3c;
            --vscode-list-hoverBackground: #2a2d2e;
            --vscode-list-hoverForeground: #ffffff;
        }
        /* ... simplified CSS for mock page ... */
        body { background: var(--bg-color); color: var(--text-color); margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #messages { flex: 1; overflow-y: auto; padding: 1rem 0; display: flex; flex-direction: column; }
        .message { padding: 0.8rem 1rem; margin-bottom: 0.5rem; border-bottom: 1px solid var(--border-color); }
        .message.user { background: var(--vscode-editor-inactiveSelectionBackground); }
        #input-container { padding: 0.75rem; border-top: 1px solid var(--border-color); }
        .input-wrapper { display: flex; border: 1px solid var(--input-border); border-radius: 6px; padding: 2px; position: relative; background: var(--input-bg); }
        textarea { flex: 1; background: transparent; border: none; color: white; padding: 0.5rem; outline: none; }
        button { background: transparent; border: none; color: white; cursor: pointer; }
        .tool-call { margin: 0.5rem 0; border: 1px solid var(--border-color); border-radius: 6px; }
        .tool-header { padding: 0.4rem 0.6rem; font-size: 0.7rem; background: var(--vscode-editorGroupHeader-tabsBackground); }
        #autocomplete-list { position: absolute; bottom: 100%; left: 0; right: 0; background: var(--vscode-dropdown-background); display:none; }
        .autocomplete-item { padding: 0.4rem; font-size: 0.75rem; cursor: pointer; }
        .autocomplete-item:hover { background: var(--vscode-list-hoverBackground); }
    </style>
</head>
<body>
    <div id="messages"></div>
    <div id="input-container">
        <div class="input-wrapper">
            <div id="autocomplete-list"></div>
            <textarea id="chat-input" placeholder="Ask Mosaic..."></textarea>
            <button id="action-button">SEND</button>
        </div>
    </div>

    <script>
        // Mock VSCode API
        const vscode = {
            postMessage: (msg) => {
                console.log('PostMessage:', msg);
                if (msg.type === 'sendMessage') {
                    simulateAssistantResponse(msg.value);
                } else if (msg.type === 'findFiles') {
                    simulateFileSuggestions(msg.value);
                }
            }
        };

        const messagesContainer = document.getElementById('messages');
        const chatInput = document.getElementById('chat-input');
        const actionButton = document.getElementById('action-button');
        const autocompleteList = document.getElementById('autocomplete-list');

        function addMessage(role, content, id) {
            const div = document.createElement('div');
            div.className = 'message ' + role;
            if (id) div.id = id;
            div.innerHTML = marked.parse(content);
            messagesContainer.appendChild(div);
            return div;
        }

        actionButton.onclick = () => {
            const text = chatInput.value;
            if (!text) return;
            addMessage('user', text);
            vscode.postMessage({ type: 'sendMessage', value: text });
            chatInput.value = '';
        };

        chatInput.oninput = (e) => {
            const text = chatInput.value;
            if (text.endsWith('@')) {
                vscode.postMessage({ type: 'findFiles', value: '' });
            } else {
                autocompleteList.style.display = 'none';
            }
        };

        function simulateAssistantResponse(val) {
            const id = 'assistant-msg-' + Date.now();
            const div = addMessage('assistant', 'Thinking...', id);
            setTimeout(() => {
                div.innerHTML = marked.parse('I can help with that. <tool_call name="read_file" id="1">{"path": "package.json"}</tool_call>');
            }, 500);
        }

        function simulateFileSuggestions(query) {
            autocompleteList.innerHTML = '';
            ['src/extension.ts', 'src/core/agent.ts', 'package.json'].forEach(f => {
                const item = document.createElement('div');
                item.className = 'autocomplete-item';
                item.textContent = f;
                item.onclick = () => {
                    chatInput.value = chatInput.value.replace(/@$/, f + ' ');
                    autocompleteList.style.display = 'none';
                    chatInput.focus();
                };
                autocompleteList.appendChild(item);
            });
            autocompleteList.style.display = 'block';
        }
    </script>
</body>
</html>
